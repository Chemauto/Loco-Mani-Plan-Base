so101_grasp:
  scene:
    num_envs: 1024
    env_spacing: 1.2
  robot:
    urdf_path: ../../../robots/assets/So101/urdf/so101_new_calib.urdf
    mjcf_path: ../../../robots/assets/So101/mjcf/so101_new_calib.xml
  table:
    size: [0.45, 0.60, 0.04]
    pos: [0.16, 0.0, 0.255]
  cube:
    size: 0.035
    mass: 0.05
    initial_pos: [0.18, 0.0, 0.2975]
  episode:
    length_s: 6.0
    decimation: 2
    sim_dt: 0.01
  reward:
    reach_weight: -2.0
    lift_weight: 8.0
    grasp_weight: 2.0           # 夹爪指接触 cube 的密集奖励（reach->lift 之间的桥）
    success_bonus: 5.0
    action_rate_weight: -0.01
    contact_force_threshold: 0.3  # N，接触力超过该值才算"碰到"；cube 仅 50g 实测接触 ~0.5N，可调
  success:
    height_threshold: 0.08
