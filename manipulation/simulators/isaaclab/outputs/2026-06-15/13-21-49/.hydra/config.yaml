agent:
  class_name: DistillationRunner
  seed: 42
  device: cuda:0
  num_steps_per_env: 24
  max_iterations: 10000
  clip_actions: null
  save_interval: 100
  experiment_name: so101_place
  run_name: distillation
  logger: tensorboard
  neptune_project: isaaclab
  wandb_project: isaaclab
  resume: false
  load_run: .*
  load_checkpoint: model_.*.pt
  torch_compile_mode: null
  obs_groups:
    student:
    - policy
    teacher:
    - teacher
  actor:
    class_name: MLPModel
    hidden_dims:
    - 256
    - 128
    - 64
    activation: elu
    obs_normalization: true
    distribution_cfg:
      class_name: GaussianDistribution
      init_std: 0.8
      std_type: scalar
  critic:
    class_name: MLPModel
    hidden_dims:
    - 256
    - 128
    - 64
    activation: elu
    obs_normalization: true
    distribution_cfg: null
  algorithm:
    class_name: Distillation
    num_learning_epochs: 5
    learning_rate: 0.001
    gradient_length: 640.0
    optimizer: adam
    loss_type: mse
  student:
    class_name: MLPModel
    hidden_dims:
    - 512
    - 256
    - 128
    activation: elu
    obs_normalization: true
    distribution_cfg:
      class_name: GaussianDistribution
      init_std: 0.1
      std_type: scalar
  teacher:
    class_name: MLPModel
    hidden_dims:
    - 256
    - 128
    - 64
    activation: elu
    obs_normalization: true
    distribution_cfg:
      class_name: GaussianDistribution
      init_std: 0.8
      std_type: scalar
